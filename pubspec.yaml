name: kirara_template
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  dio: ^5.9.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.2.1
  font_awesome_flutter: ^11.0.0
  shared_preferences: ^2.5.2
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  logger: ^2.6.2
  riverpod_annotation: ^4.0.2
  slang: ^4.12.1
  slang_flutter: ^4.12.1
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.0.2
  dropdown_search: ^6.0.2
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.11.1
  go_router_builder: ^4.2.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  slang_build_runner: ^4.12.1
  flutter_gen_runner: ^5.12.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - .env

flutter_gen:
  output: lib/core/gen/
  line_length: 80
  colors:
    inputs:
      - assets/colors/colors.xml
